liquid.arkycite.description = يُستخدم في التفاعلات الكيميائية لتوليد الطاقة وتصنيع المواد.
liquid.ozone.description = يُستخدم كوقود وعامل مؤكسد في إنتاج المواد. متفجر بدرجة متوسطة.
liquid.hydrogen.description = يُستخدم في استخراج الموارد وإنتاج الوحدات وإصلاح المنشآت. قابل للاشتعال.
liquid.cyanogen.description = يُستخدم للذخيرة وبناء الوحدات المتقدمة وتفاعلات متنوعة في الكتل المتقدمة. قابل للاشتعال بشدة.
liquid.nitrogen.description = يُستخدم في استخراج الموارد وإنشاء الغازات وإنتاج الوحدات. خامل.
liquid.neoplasm.description = منتج ثانوي بيولوجي خطير لمفاعل النيوبلازيا. ينتشر بسرعة إلى أي كتلة مجاورة تحتوي على الماء يلامسها، مما يلحق الضرر بها أثناء ذلك. لزج.
liquid.neoplasm.details = نيوبلازم. كتلة غير قابلة للسيطرة من خلايا اصطناعية سريعة الانقسام ذات قوام يشبه الوحل. مقاومة للحرارة. خطيرة للغاية على أي منشآت تحتوي على ماء.\n\nمعقدة وغير مستقرة للغاية للتحليل القياسي. الاستخدامات المحتملة غير معروفة. يُنصح بالحرق في برك الخبث المنصهر.

block.derelict = \uF77E [lightgray]Derelict
block.armored-conveyor.description = ينقل العناصر إلى الأمام. لا يقبل المدخلات غير الناقلة من الجوانب.
