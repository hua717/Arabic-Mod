block.phase-wall-large.description = يحمي المنشآت من مقذوفات العدو، ويعكس معظم الطلقات عند الارتطام.
block.surge-wall.description = يحمي المنشآت من مقذوفات العدو، ويطلق أقواسًا كهربائية دوريًا عند التلامس.
block.surge-wall-large.description = يحمي المنشآت من مقذوفات العدو، ويطلق أقواسًا كهربائية دوريًا عند التلامس.
