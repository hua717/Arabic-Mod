sector.onset.description = ابدأ غزو Erekir. اجمع الموارد، أنتج الوحدات، وابدأ بحث التقنية.
sector.aegis.description = يحتوي هذا القطاع على رواسب من التنغستن.\nابحث [accent]مثقاب الارتطام[] لتعدين هذا المورد، ودمّر قاعدة العدو في المنطقة.
sector.lake.description = تحدّ بحيرة الخبث في هذا القطاع بشدة من الوحدات القابلة للاستخدام. الوحدة الطائرة المحلقة هي الخيار الوحيد.\nابحث [accent]مصنّع السفن[] وأنتج وحدة [accent]elude[] بأسرع ما يمكن.
sector.intersect.description = تشير المسوحات إلى أن هذا القطاع سيتعرض للهجوم من جهات متعددة بعد الهبوط مباشرةً.\nأقم الدفاعات بسرعة وتوسّع في أقرب وقت ممكن.\nستكون وحدات [accent]الميك[] ضرورية لتضاريس المنطقة الوعرة.
sector.atlas.description = يحتوي هذا القطاع على تضاريس متنوعة وسيتطلب مجموعة متنوعة من الوحدات للهجوم بفعالية.\nقد تكون الوحدات المطوّرة ضرورية أيضًا لتجاوز بعض قواعد العدو المكتشفة هنا.\nابحث [accent]جهاز التحليل الكهربائي[] و[accent]معيد تصنيع الدبابات[].
sector.split.description = يجعل الوجود الضئيل للعدو في هذا القطاع مثاليًا لاختبار تقنية النقل الجديدة.
sector.basin.description = تم رصد وجود كبير للعدو في هذا القطاع.\nابنِ الوحدات بسرعة واستولِ على أنوية العدو لتأمين موطئ قدم.
sector.marsh.description = يحتوي هذا القطاع على وفرة من الأركيسايت، لكن به عدد محدود من الفتحات الحرارية.\nابنِ [accent]غرف الاحتراق الكيميائي[] لتوليد الطاقة.
sector.peaks.description = تجعل التضاريس الجبلية في هذا القطاع معظم الوحدات عديمة الفائدة. ستكون الوحدات الطائرة ضرورية.\nانتبه لمنشآت مضادة للطيران تابعة للعدو. قد يكون من الممكن تعطيل بعض هذه المنشآت باستهداف المباني الداعمة لها.
sector.ravine.description = طريق نقل مهم للعدو. لم يتم رصد أنوية في القطاع، لكن توقّع تنوعًا في قوات العدو.\nأنتج [accent]سبيكة الاندفاع[]. ابنِ أبراج [accent]Afflict[].
sector.caldera-erekir.description = الموارد المكتشفة في هذا القطاع موزعة عبر عدة جزر.\nابحث وانشر وسائل نقل تعتمد على الطائرات المسيّرة.
sector.stronghold.description = يحرس معسكر العدو الكبير في هذا القطاع رواسب كبيرة من [accent]الثوريوم[].\nاستخدمه لتطوير وحدات وأبراج من فئة أعلى.
sector.crevice.description = سيرسل العدو قوات هجومية شرسة للقضاء على قاعدتك في هذا القطاع.\nقد يكون تطوير [accent]الكربيد[] و[accent]مولد التحلل الحراري[] ضروريًا للبقاء.
sector.siege.description = يضم هذا القطاع أخدودين متوازيين سيفرضان هجومًا من جبهتين.\nابحث [accent]السيانوجين[] لاكتساب القدرة على إنشاء وحدات دبابات أقوى.\nتحذير: تم رصد صواريخ بعيدة المدى للعدو. يمكن إسقاط الصواريخ قبل ارتطامها.
sector.crossroads.description = تأسست قواعد العدو في هذا القطاع في تضاريس متنوعة. ابحث وحدات مختلفة للتكيف.\nإضافة إلى ذلك، بعض القواعد محمية بدروع. اكتشف كيفية تزويدها بالطاقة.
sector.karst.description = هذا القطاع غني بالموارد، لكنه سيتعرض لهجوم العدو بمجرد هبوط نواة جديدة.\nاستفد من الموارد وابحث [accent]نسيج الطور[].
sector.origin.description = القطاع الأخير الذي يضم وجودًا كبيرًا للعدو.\nلم تعد هناك فرص بحث محتملة - ركّز فقط على تدمير جميع أنوية العدو.

