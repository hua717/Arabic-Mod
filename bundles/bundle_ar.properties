hint.boost = اضغط مطولًا على [accent][[L-Shift][] للطيران فوق العوائق بوحدتك الحالية.\n\nعدد قليل فقط من الوحدات البرية لديها معززات.
hint.payloadPickup = اضغط على [accent][[[] لالتقاط الكتل أو الوحدات الصغيرة.
hint.payloadPickup.mobile = [accent]انقر واضغط مطولًا[] على كتلة أو وحدة صغيرة لالتقاطها.
hint.payloadDrop = اضغط على [accent]][] لإسقاط الحمولة.
hint.payloadDrop.mobile = [accent]انقر واضغط مطولًا[] على موقع فارغ لإسقاط الحمولة هناك.
hint.waveFire = أبراج [accent]Wave[] التي تستخدم الماء كذخيرة ستطفئ الحرائق القريبة تلقائيًا.
hint.guardian = وحدات [accent]الحارس[] مدرّعة. الذخيرة الضعيفة مثل [accent]النحاس[] و[accent]الرصاص[] [scarlet]غير فعالة[].\n\nاستخدم أبراجًا من فئة أعلى أو ذخيرة :graphite: [accent]الغرافيت[] :duo:Duo/:salvo:Salvo لإسقاط الحراس.
hint.coreUpgrade = يمكن ترقية الأنوية عن طريق [accent]وضع أنوية من فئة أعلى فوقها[].\n\nضع نواة :core-foundation: [accent]الأساس[] فوق نواة :core-shard: [accent]الشظية[]. تأكد من خلوها من العوائق القريبة.
hint.serpuloCoreZone = يمكن بناء أنوية :core-shard: [accent]إضافية[] على بلاطات :core-zone: [accent]منطقة النواة[].
hint.cannotUpgrade = تشير أيقونة [red]:tree:[] فوق وحدة الحمولة إلى أن نسختها المطورة لم يتم بحثها بعد.\n\nيجب بحث ترقيات الوحدات في [accent]:tree: شجرة التقنية[] قبل أن يمكن إنتاجها في أجهزة إعادة البناء.
hint.presetLaunch = يمكن الإطلاق إلى [accent]قطاعات منطقة الهبوط[] الرمادية، مثل [accent]الغابة المتجمدة[]، من أي مكان. لا تتطلب الاستيلاء على الأراضي القريبة.\n\n[accent]القطاعات المرقمة[]، مثل هذا القطاع، [accent]اختيارية[].
hint.presetDifficulty = هذا القطاع لديه [scarlet]مستوى تهديد عدائي مرتفع[].\nلا يُنصح [accent]بالإطلاق[] إلى مثل هذه القطاعات دون تقنية واستعداد مناسبين.
hint.coreIncinerate = بعد امتلاء النواة بالكامل بعنصر ما، سيتم [accent]حرق[] أي عناصر إضافية من هذا النوع تستقبلها.
hint.factoryControl = لتحديد [accent]وجهة الإخراج[] لمصنع الوحدات، انقر على كتلة المصنع أثناء وضع الأوامر، ثم انقر بالزر الأيمن على موقع.\nستتحرك الوحدات المنتجة منه تلقائيًا إلى هناك.
hint.factoryControl.mobile = لتحديد [accent]وجهة الإخراج[] لمصنع الوحدات، انقر على كتلة المصنع أثناء وضع الأوامر، ثم انقر على موقع.\nستتحرك الوحدات المنتجة منه تلقائيًا إلى هناك.

gz.mine = تحرك بالقرب من :ore-copper: [accent]خام النحاس[] على الأرض وانقر لبدء التعدين.
gz.mine.mobile = تحرك بالقرب من :ore-copper: [accent]خام النحاس[] على الأرض وانقر عليه لبدء التعدين.
gz.research = افتح :tree: شجرة التقنية.\nابحث :mechanical-drill: [accent]المثقاب الميكانيكي[]، ثم حدده من قائمة :production: في أسفل اليمين.\nانقر على رقعة نحاس لوضعه.
gz.research.mobile = افتح :tree: شجرة التقنية.\nابحث :mechanical-drill: [accent]المثقاب الميكانيكي[]، ثم حدده من قائمة :production: في أسفل اليمين.\nانقر على رقعة نحاس لوضعه.\n\nاضغط على علامة :ok: [accent]الصح[] في أسفل اليمين للتأكيد.
gz.conveyors = ابحث وضع :conveyor: [accent]الناقلات[] لنقل الموارد المستخرجة\nمن المثاقب إلى النواة.\n\nانقر واسحب لوضع عدة ناقلات.\n[accent]قم بالتمرير[] للتدوير.
gz.conveyors.mobile = ابحث وضع :conveyor: [accent]الناقلات[] لنقل الموارد المستخرجة\nمن المثاقب إلى النواة.\n\nاضغط مطولًا بإصبعك لثانية ثم اسحب لوضع عدة ناقلات.
gz.drills = وسّع عملية التعدين.\nضع المزيد من المثاقب الميكانيكية.\nعدّن 100 نحاس.
gz.lead = :lead: [accent]الرصاص[] هو مورد شائع آخر.\nأعدّ مثاقب لتعدين الرصاص.
gz.moveup = :up: تحرك للأعلى للحصول على أهداف إضافية.
gz.turrets = ابحث وضع برجي :duo: [accent]Duo[] للدفاع عن النواة.\nتتطلب أبراج Duo :copper: [accent]ذخيرة[] من الناقلات.
gz.duoammo = زوّد أبراج Duo بـ :copper: [accent]النحاس[]، باستخدام الناقلات.
gz.walls = يمكن [accent]للجدران[] منع الضرر القادم من الوصول إلى المباني.\nضع :copper-wall: [accent]جدرانًا نحاسية[] حول الأبراج.
gz.defend = العدو قادم، استعد للدفاع.
gz.aa = لا يمكن التخلص من الوحدات الطائرة بسهولة باستخدام الأبراج العادية.\nتوفر أبراج :scatter: [accent]Scatter[] دفاعًا جويًا ممتازًا، لكنها تتطلب :lead: [accent]الرصاص[] كذخيرة.
gz.scatterammo = زوّد برج Scatter بـ :lead: [accent]الرصاص[]، باستخدام الناقلات.
gz.supplyturret = [accent]تزويد البرج
gz.zone1 = هذه منطقة إسقاط العدو.
gz.zone2 = يتم تدمير أي شيء يُبنى داخل هذا النطاق عند بدء الموجة.
gz.zone3 = ستبدأ موجة الآن.\nاستعد.
gz.finish = ابنِ المزيد من الأبراج، وعدّن المزيد من الموارد،\nودافع ضد جميع الموجات [accent]للاستيلاء على القطاع[].

ff.coal = استخدم :mechanical-drill: [accent]المثاقب الميكانيكية[] لتعدين :ore-coal: [accent]الفحم[].
ff.graphitepress = :tree: ابحث وضع :graphite-press: [accent]معصرة الغرافيت[].
ff.craft = انقل :coal: الفحم إلى :graphite-press: [accent]معصرة الغرافيت[].\nستُخرج :graphite: الغرافيت إلى جميع الناقلات القريبة.\nانقل :graphite: الغرافيت الناتج من :graphite-press: [accent]معصرة الغرافيت[] إلى النواة.
ff.generator = يمكن استخدام :coal: الفحم أيضًا كوقود في :combustion-generator: [accent]مولدات الاحتراق[].\nابحث وضع :combustion-generator: [accent]مولد احتراق[].
ff.coalpower = أدخل :coal: الفحم إلى المولد لإنتاج [accent]:power: الطاقة[].
ff.coalpower.objective = :combustion-generator: إنتاج الطاقة
ff.node = تنقل :power-node: [accent]عقد الطاقة[] الطاقة إلى الكتل القريبة ضمن النطاق.\nابحث وضع :power-node: [accent]عقدة طاقة[] بالقرب من المولد.
ff.battery = تخزن :battery: [accent]البطاريات[] الطاقة.\nابحث وضع :battery: [accent]بطارية[] بالقرب من العقدة.
ff.arc = تتطلب أبراج :arc: [accent]Arc[] طاقة للعمل. ابحث وضع برج :arc: [accent]Arc[] بالقرب من عقدة طاقة.

fungalpass.tutorial1 = استخدم [accent]الوحدات[] للدفاع عن المباني ومهاجمة العدو.\nابحث وضع :ground-factory: [accent]مصنع وحدات بري[].
fungalpass.tutorial2 = حدد وحدات :dagger: [accent]Dagger[] في المصنع.\nأنتج 3 وحدات.

frontier.tutorial1 = يقوم :additive-reconstructor: [accent]المعيد الإضافي[]\nبترقية وحدات الفئة 1 إلى الفئة 2\nباستخدام :silicon: السيليكون و:graphite: الغرافيت.\n\n[accent]أعد بناء []:dagger:[accent] الـ Dagger\nإلى []:mace:[accent] الـ Mace.
frontier.tutorial2 = تُرسل موجات العدو [accent]بلا نهاية[] حتى يتم [unlaunched]تدمير[] جميع أنوية العدو.
frontier.tutorial3 = [accent]هاجم قاعدة العدو بسرعة لمنع الموجات من الازدياد كثيرًا[].

atolls.destroy1 = دمّر [accent]نواتي الأساس[] الخاصتين بالعدو أولًا.\n[accent]احصل على إمكانية الوصول إلى الثوريوم[].
atolls.mega1 = ادخل [accent]وضع الأوامر[] وحدد وحدات :mega:[accent]Mega[].
atolls.mega2 = حدد أمر [accent]تحميل الوحدات[] لجعل وحدات Mega تلتقط الوحدات البرية.
atolls.mega3 = حرّك وحدات Mega إلى [accent]أعلى[] الوحدات البرية لتحميلها.
atolls.mega4 = [accent]أسقط الوحدات البرية هنا للهجوم.
atolls.mega5 = حدد أمر [accent]تفريغ الحمولة[] لجعل وحدات Mega تُسقط الوحدات التي تحملها.
atolls.mega6 = سيتم [accent]إسقاط الوحدات تلقائيًا[] أثناء تحديد أمر تفريغ الحمولة.
atolls.mega7 = [accent]لن تُسقط[] وحدات Mega الوحدات البرية أثناء وجودها فوق الجدران أو الماء العميق.
atolls.mega8 = [accent]أسقط الوحدات البحرية هنا للهجوم.[]
atolls.attack1 = 1: أسقط الوحدات البرية هنا للهجوم من هذا الموقع.
atolls.attack2 = 2: بدلًا من ذلك، أسقط الوحدات البحرية هنا لشن هجوم مفاجئ.
atolls.carry1 = يتطلب حمل الوحدات البرية وحدات :mega:[accent]Mega[].
atolls.carry2 = 1: وجّه وحدات Mega [accent]للتحرك فوق[] الوحدات البرية.
atolls.carry3 = 2: حدد أمر [accent]تحميل الوحدات[] لالتقاط الوحدات البرية بوحدات Mega.
atolls.carry4 = 3: وجّه وحرّك ناقلات Mega [accent]المحمّلة بالوحدات[].
atolls.carry5 = 4: حدد أمر [accent]'تفريغ الحمولة'[] لجعل وحدات Mega تُسقط الوحدات البرية.
atolls.carry6 = يمكن مراجعة هذه الخطوات [accent]هنا[].
atolls.carry7 = اتبع هذه التعليمات لإسقاط المزيد من الوحدات جوًا بالقرب من قاعدة العدو.
atolls.noairunit = هذه القاعدة محصنة جدًا بحيث لا يمكن تدميرها بالوحدات الجوية.
atolls.2strategies = هناك استراتيجيتان لتدمير هذه القاعدة.

onset.mine = انقر لتعدين :beryllium: [accent]البيريليوم[] من الجدران.\n\nاستخدم [accent][[WASD] للتحرك.
onset.mine.mobile = انقر لتعدين :beryllium: [accent]البيريليوم[] من الجدران.
onset.research = افتح :tree: شجرة التقنية.\nابحث، ثم ضع :turbine-condenser: [accent]مكثف توربين[] على الفتحة.\nسيولّد هذا [accent]الطاقة[].
onset.bore = ابحث وضع :plasma-bore: [accent]مثقاب بلازما[].\nيقوم هذا تلقائيًا بتعدين الموارد من الجدران.
onset.power = [accent]لتزويد[] مثقاب البلازما بالطاقة، ابحث وضع :beam-node: [accent]عقدة شعاع[].\nصل مكثف التوربين بمثقاب البلازما.
onset.ducts = ابحث وضع :duct: [accent]القنوات[] لنقل الموارد المستخرجة من مثقاب البلازما إلى النواة.\nانقر واسحب لوضع عدة قنوات.\n[accent]قم بالتمرير[] للتدوير.
onset.ducts.mobile = ابحث وضع :duct: [accent]القنوات[] لنقل الموارد المستخرجة من مثقاب البلازما إلى النواة.\n\nاضغط مطولًا بإصبعك لثانية ثم اسحب لوضع عدة قنوات.
onset.moremine = وسّع عملية التعدين.\nضع المزيد من مثاقب البلازما واستخدم عقد الشعاع والقنوات لدعمها.\nعدّن 200 بيريليوم.
onset.graphite = تتطلب الكتل الأكثر تعقيدًا :graphite: [accent]الغرافيت[].\nأعدّ مثاقب بلازما لتعدين الغرافيت.
onset.research2 = ابدأ بحث [accent]المصانع[].\nابحث :cliff-crusher: [accent]كاسر الجرف[] و:silicon-arc-furnace: [accent]فرن قوس السيليكون[].
onset.arcfurnace = يحتاج فرن القوس إلى :sand: [accent]الرمل[] و:graphite: [accent]الغرافيت[] لإنشاء :silicon: [accent]السيليكون[].\n[accent]الطاقة[] مطلوبة أيضًا.
onset.crusher = استخدم :cliff-crusher: [accent]كاسرات الجرف[] لتعدين الرمل.
onset.fabricator = استخدم [accent]الوحدات[] لاستكشاف الخريطة، والدفاع عن المباني، ومهاجمة العدو. ابحث وضع :tank-fabricator: [accent]مصنّع دبابات[].
onset.makeunit = أنتج وحدة.\nاستخدم زر "?" لمعرفة متطلبات المصنع المحدد.
onset.turrets = الوحدات فعالة، لكن [accent]الأبراج[] توفر قدرات دفاعية أفضل إذا استُخدمت بفعالية.\nضع برج :breach: [accent]Breach[].\nتتطلب الأبراج :beryllium: [accent]ذخيرة[].
onset.turretammo = زوّد البرج بـ[accent]البيريليوم[] كذخيرة، باستخدام القنوات.
onset.walls = يمكن [accent]للجدران[] منع الضرر القادم من الوصول إلى المباني.\nضع بعض :beryllium-wall: [accent]جدران البيريليوم[] حول البرج.
onset.enemies = العدو قادم، استعد للدفاع.
onset.defenses = [accent]أعدّ الدفاعات:[lightgray] {0}
onset.attack = العدو ضعيف. اشنّ هجومًا مضادًا.
onset.cores = يمكن وضع أنوية جديدة على [accent]بلاطات النواة[].\nتعمل الأنوية الجديدة كقواعد أمامية وتشارك مخزون الموارد مع الأنوية الأخرى.\nضع نواة :core-bastion:.
onset.detect = سيتمكن العدو من رصدك خلال دقيقتين.\nأعدّ الدفاعات والتعدين والإنتاج.
onset.commandmode = اضغط مطولًا على [accent]shift[] للدخول إلى [accent]وضع الأوامر[].\n[accent]انقر بالزر الأيسر واسحب[] لتحديد الوحدات.\n[accent]انقر بالزر الأيمن[] لأمر الوحدات المحددة بالتحرك أو الهجوم.
onset.commandmode.mobile = اضغط على [accent]زر الأوامر[] للدخول إلى [accent]وضع الأوامر[].\nاضغط مطولًا بإصبعك، ثم [accent]اسحب[] لتحديد الوحدات.\n[accent]انقر[] لأمر الوحدات المحددة بالتحرك أو الهجوم.
aegis.tungsten = يمكن تعدين التنغستن باستخدام [accent]مثقاب الارتطام[].\nتتطلب هذه المنشأة [accent]الماء[] و[accent]الطاقة[].

split.pickup = يمكن التقاط بعض الكتل بواسطة وحدة النواة.\nالتقط هذه [accent]الحاوية[] وضعها على [accent]محمّل الحمولة[].\n(المفاتيح الافتراضية هي [[ و ] للالتقاط والإسقاط)
split.pickup.mobile = يمكن التقاط بعض الكتل بواسطة وحدة النواة.\nالتقط هذه [accent]الحاوية[] وضعها على [accent]محمّل الحمولة[].\n(للالتقاط أو الإسقاط، اضغط مطولًا على الشيء.)
split.acquire = احصل على بعض التنغستن لبناء الوحدات.
split.build = يجب نقل الوحدات إلى الجانب الآخر من الجدار.\nضع جهازي [accent]دافع كتلة للحمولة[]، واحدًا على كل جانب من الجدار.\nأنشئ الرابط بالضغط على أحدهما، ثم تحديد الآخر.
split.container = مثل الحاوية، يمكن أيضًا نقل الوحدات باستخدام [accent]دافع كتلة للحمولة[].\nضع مصنّع وحدات مجاورًا لدافع الكتلة لتحميلها، ثم أرسلها عبر الجدار لمهاجمة قاعدة العدو.

item.copper.description = يُستخدم في جميع أنواع البناء والذخيرة.
item.copper.details = النحاس. معدن وفير بشكل غير طبيعي على Serpulo. ضعيف هيكليًا ما لم يُعزَّز.
item.lead.description = يُستخدم في نقل السوائل والمنشآت الكهربائية.
item.lead.details = كثيف. خامل. يُستخدم بكثرة في البطاريات.\nملاحظة: على الأرجح سام للكائنات الحية؛ ليس أن هناك الكثير منها متبقٍ هنا.
item.metaglass.description = يُستخدم في منشآت توزيع/تخزين السوائل.
item.graphite.description = يُستخدم في المكونات الكهربائية وذخيرة الأبراج.
item.sand.description = يُستخدم في إنتاج مواد مكررة أخرى.
item.coal.description = يُستخدم كوقود وفي إنتاج المواد المكررة.
item.coal.details = يبدو أنه مادة نباتية متحجرة، تشكلت قبل زمن طويل من حدث البذر.
item.titanium.description = يُستخدم في منشآت نقل السوائل والمثاقب والمصانع.
item.thorium.description = يُستخدم في المنشآت المتينة وكوقود نووي.
item.scrap.description = يُستخدم في المصاهر والمطاحن لتكريره إلى مواد أخرى.
item.scrap.details = بقايا متبقية من منشآت ووحدات قديمة.
item.silicon.description = يُستخدم في الألواح الشمسية والإلكترونيات المعقدة وذخيرة الأبراج الموجهة.
item.plastanium.description = يُستخدم في الوحدات المتقدمة والعزل وذخيرة الشظايا.
item.phase-fabric.description = يُستخدم في الإلكترونيات المتقدمة والمنشآت ذاتية الإصلاح.
item.surge-alloy.description = يُستخدم في الأسلحة المتقدمة ومنشآت الدفاع التفاعلي.
item.spore-pod.description = يُستخدم لتحويله إلى نفط ومتفجرات ووقود.
item.spore-pod.details = جراثيم. على الأرجح شكل حياة اصطناعي. تنبعث منها غازات سامة للكائنات الحية الأخرى. شديدة الانتشار. قابلة للاشتعال بشدة في ظروف معينة.
item.blast-compound.description = يُستخدم في القنابل والذخيرة المتفجرة.
item.pyratite.description = يُستخدم في الأسلحة الحارقة والمولدات التي تعمل بالاحتراق.

#Erekir
item.beryllium.description = يُستخدم في العديد من أنواع البناء والذخيرة على Erekir.
item.tungsten.description = يُستخدم في المثاقب والدروع والذخيرة. مطلوب في بناء المنشآت الأكثر تقدمًا.
item.oxide.description = يُستخدم كموصل حراري وعازل للطاقة.
item.carbide.description = يُستخدم في المنشآت المتقدمة والوحدات الأثقل والذخيرة.

liquid.water.description = يُستخدم لتبريد الآلات ومعالجة النفايات.
liquid.slag.description = يُكرَّر في الفواصل إلى المعادن المكونة له. يُستهلك في الأبراج السائلة كذخيرة.
liquid.oil.description = يُستخدم في إنتاج المواد المتقدمة وكذخيرة حارقة.
liquid.cryofluid.description = يُستخدم كمبرّد في المفاعلات والأبراج والمصانع.

