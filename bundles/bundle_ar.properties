settings.clearall.confirm = [scarlet]تحذير![]\nسيؤدي هذا إلى مسح جميع البيانات، بما في ذلك ملفات الحفظ والخرائط والعناصر المفتوحة واختصارات لوحة المفاتيح.\nبمجرد الضغط على 'موافق' ستمسح اللعبة جميع البيانات وتغلق تلقائيًا.
