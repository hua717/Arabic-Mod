block.door.description = جدار يمكن فتحه وإغلاقه.
block.door-large.description = جدار يمكن فتحه وإغلاقه.
block.mender.description = يصلح الكتل القريبة منه دوريًا.\nيمكنه اختياريًا استخدام السيليكون لتعزيز النطاق والكفاءة.
block.mend-projector.description = يصلح الكتل القريبة منه.\nيمكنه اختياريًا استخدام قماش الطور لتعزيز النطاق والكفاءة.
block.overdrive-projector.description = يزيد من سرعة المباني القريبة.\nيمكنه اختياريًا استخدام قماش الطور لتعزيز النطاق والكفاءة. لا يتراكم.
block.force-projector.description = ينشئ حقل قوة سداسيًا حوله، يحمي المباني والوحدات بداخله من الضرر.\nيسخن بشكل زائد إذا تعرض لضرر كبير. يمكنه اختياريًا استخدام المبرد لمنع السخونة الزائدة. قماش الطور يزيد من حجم الدرع.
block.shock-mine.description = يطلق أقواسًا كهربائية عند تلامس وحدات العدو.
block.conveyor.description = ينقل العناصر إلى الأمام.
block.titanium-conveyor.description = ينقل العناصر إلى الأمام. أسرع من الناقل العادي.
block.plastanium-conveyor.description = ينقل العناصر إلى الأمام على دفعات. يقبل العناصر من الخلف، ويفرغها في ثلاثة اتجاهات من الأمام. يتطلب عدة نقاط تحميل وتفريغ للوصول إلى أقصى معدل إنتاجية.
block.junction.description = يعمل كجسر لناقلين متقاطعين.
block.bridge-conveyor.description = ينقل العناصر فوق التضاريس أو المباني.
block.phase-conveyor.description = ينقل العناصر فوريًا فوق التضاريس أو المباني. مدى أطول من جسر العناصر، لكنه يتطلب طاقة.
block.sorter.description = إذا طابق عنصر الإدخال التحديد، يمر إلى الأمام. وإلا، يُخرج العنصر إلى اليسار واليمين.
block.inverted-sorter.description = مشابه للفارز العادي، لكنه يُخرج العناصر المحددة إلى الجانبين بدلًا من ذلك.
block.router.description = يوزع عناصر الإدخال إلى 3 اتجاهات إخراج بالتساوي.
block.router.details = شرٌ لا بد منه. لا يُنصح باستخدامه بجانب مدخلات الإنتاج، إذ ستنسد بالمخرجات.
block.distributor.description = يوزع عناصر الإدخال إلى 7 اتجاهات إخراج بالتساوي.
block.overflow-gate.description = يُخرج العناصر إلى اليسار واليمين فقط إذا كان المسار الأمامي مسدودًا.
block.underflow-gate.description = عكس بوابة الفيض. يُخرج إلى الأمام إذا كانت المسارات اليسرى واليمنى مسدودة.
block.mass-driver.description = منشأة نقل عناصر بعيدة المدى. تجمع دفعات من العناصر وتطلقها إلى دوافع كتلة أخرى.
block.mechanical-pump.description = يضخ ويخرج السوائل. لا يتطلب طاقة.
block.rotary-pump.description = يضخ ويخرج السوائل. يتطلب طاقة.
block.impulse-pump.description = يضخ ويخرج السوائل.
block.conduit.description = ينقل السوائل إلى الأمام. يُستخدم مع المضخات والأنابيب الأخرى.
block.pulse-conduit.description = ينقل السوائل إلى الأمام. ينقل بشكل أسرع ويخزن أكثر من الأنابيب العادية.
block.plated-conduit.description = ينقل السوائل إلى الأمام. لا يقبل الإدخال من الجوانب. لا يتسرب.
block.liquid-router.description = يقبل السوائل من اتجاه واحد ويخرجها إلى ما يصل إلى 3 اتجاهات أخرى بالتساوي. يمكنه أيضًا تخزين كمية معينة من السائل.
block.liquid-container.description = يخزن كمية كبيرة من السائل. يخرج إلى جميع الجوانب، مشابه لموجّه السوائل.
block.liquid-tank.description = يخزن كمية هائلة من السائل. يخرج إلى جميع الجوانب، مشابه لموجّه السوائل.
block.liquid-junction.description = يعمل كجسر بين أنبوبين متقاطعين.
block.bridge-conduit.description = ينقل السوائل فوق التضاريس أو المباني.
block.phase-conduit.description = ينقل السوائل فوق التضاريس أو المباني. مدى أطول من أنبوب الجسر، لكنه يتطلب طاقة.
block.power-node.description = ينقل الطاقة إلى العقد المتصلة. تستقبل العقدة الطاقة من أو تزود بها أي كتل مجاورة.
block.power-node-large.description = عقدة طاقة متقدمة ذات نطاق أكبر.
block.surge-tower.description = عقدة طاقة بعيدة المدى بعدد أقل من الاتصالات المتاحة.
block.diode.description = ينقل طاقة البطارية في اتجاه واحد، لكن فقط إذا كان الجانب الآخر يحتوي على طاقة أقل مخزنة.
block.battery.description = يخزن الطاقة في أوقات الفائض. يخرج الطاقة في أوقات العجز.
block.battery-large.description = يخزن الطاقة في أوقات الفائض. يخرج الطاقة في أوقات العجز. سعة أعلى من البطارية العادية.
block.combustion-generator.description = يولّد الطاقة عن طريق حرق المواد القابلة للاشتعال، مثل الفحم.
block.thermal-generator.description = يولّد الطاقة عند وضعه في مواقع ساخنة.
block.steam-generator.description = يولّد الطاقة عن طريق حرق المواد القابلة للاشتعال وتحويل الماء إلى بخار.
block.differential-generator.description = يولّد كميات كبيرة من الطاقة. يستغل فارق درجة الحرارة بين سائل التبريد والبيراتيت المحترق.
block.rtg-generator.description = يستخدم حرارة المركبات المشعة المتحللة لإنتاج الطاقة بمعدل بطيء.
block.solar-panel.description = يوفر كمية صغيرة من الطاقة من الشمس.
block.solar-panel-large.description = يوفر كمية صغيرة من الطاقة من الشمس. أكثر كفاءة من اللوح الشمسي العادي.
block.thorium-reactor.description = يولّد كميات كبيرة من الطاقة من الثوريوم. يتطلب تبريدًا مستمرًا. سينفجر بعنف إذا لم يُزوَّد بكميات كافية من المبرد.
block.impact-reactor.description = ينتج كميات هائلة من الطاقة عند أقصى كفاءة. يتطلب مدخل طاقة كبير لبدء العملية.
block.mechanical-drill.description = عند وضعه على خام، يُخرج عناصر بمعدل بطيء إلى ما لا نهاية. قادر فقط على تعدين الموارد الأساسية.
block.pneumatic-drill.description = مثقاب محسّن، قادر على تعدين التيتانيوم. يعدّن بمعدل أسرع من المثقاب الميكانيكي.
block.laser-drill.description = يتيح الحفر بشكل أسرع بفضل تقنية الليزر، لكنه يتطلب طاقة. قادر على تعدين الثوريوم.
block.blast-drill.description = المثقاب الأمثل. يتطلب كميات كبيرة من الطاقة.
block.water-extractor.description = يستخرج المياه الجوفية. يُستخدم في المواقع التي لا تتوفر فيها مياه سطحية.
block.cultivator.description = يزرع تركيزات ضئيلة من الجراثيم الجوية لتكوين قرون الجراثيم.
block.cultivator.details = تقنية مستعادة. تُستخدم لإنتاج كميات هائلة من الكتلة الحيوية بأعلى كفاءة ممكنة. على الأرجح هي الحاضنة الأولى للجراثيم التي تغطي Serpulo الآن.
block.oil-extractor.description = يستخدم كميات كبيرة من الطاقة والرمل والماء لحفر النفط.
block.core-shard.description = نواة القاعدة. بمجرد تدميرها، يُفقد القطاع.
block.core-shard.details = النسخة الأولى. مدمجة. ذاتية التكاثر. مزودة بدافعات إطلاق أحادية الاستخدام. غير مصممة للسفر بين الكواكب.
block.core-foundation.description = نواة القاعدة. مدرعة جيدًا. تخزن موارد أكثر من نواة Shard.
block.core-foundation.details = النسخة الثانية.
block.core-nucleus.description = نواة القاعدة. مدرعة بشكل استثنائي. تخزن كميات هائلة من الموارد.
block.core-nucleus.details = النسخة الثالثة والأخيرة.
block.vault.description = يخزن كمية كبيرة من العناصر من كل نوع. يوسّع التخزين عند وضعه بجانب نواة. يمكن استرجاع المحتويات باستخدام مفرّغ.
block.container.description = يخزن كمية صغيرة من العناصر من كل نوع. يوسّع التخزين عند وضعه بجانب نواة. يمكن استرجاع المحتويات باستخدام مفرّغ.
block.unloader.description = يفرّغ العنصر المحدد من الكتل القريبة.
block.launch-pad.description = يطلق دفعات من العناصر إلى القطاعات المحددة.
block.advanced-launch-pad.description = يطلق دفعات من العناصر إلى القطاعات المحددة. يقبل نوع عنصر واحد فقط في كل مرة.
block.advanced-launch-pad.details = نظام شبه مداري لنقل الموارد من نقطة إلى نقطة.
block.landing-pad.description = يستقبل العناصر من منصات الإطلاق في القطاعات الأخرى. يتطلب كميات كبيرة من الماء للحماية من صدمات الهبوط.
block.duo.description = يطلق طلقات متبادلة على الأعداء.
block.scatter.description = يطلق كتلًا من الرصاص أو الخردة أو شظايا الميتاغلاس على طائرات العدو.
block.scorch.description = يحرق أي أعداء بريين قريبين منه. فعال جدًا في المدى القريب.
block.hail.description = يطلق قذائف صغيرة على الأعداء البريين عبر مسافات طويلة.
block.wave.description = يطلق تيارات من السائل على الأعداء. يطفئ الحرائق تلقائيًا عند تزويده بالماء.
block.lancer.description = يشحن ويطلق أشعة طاقة قوية على الأهداف البرية.
block.arc.description = يطلق أقواسًا كهربائية على الأهداف البرية.
block.swarmer.description = يطلق صواريخ موجهة على الأعداء.
block.salvo.description = يطلق دفعات سريعة من الطلقات على الأعداء.
block.fuse.description = يطلق ثلاث انفجارات نافذة قريبة المدى على الأعداء القريبين.
block.ripple.description = يطلق مجموعات من القذائف على الأعداء البريين عبر مسافات طويلة.
block.cyclone.description = يطلق كتلًا متفجرة من الشظايا على الأعداء القريبين.
block.spectre.description = يطلق طلقات كبيرة على الأهداف الجوية والبرية.
block.meltdown.description = يشحن ويطلق شعاع ليزر مستمرًا على الأعداء القريبين. يتطلب مبردًا للعمل.
block.foreshadow.description = يطلق طلقة كبيرة أحادية الهدف عبر مسافات طويلة. يستهدف الأعداء ذوي الصحة القصوى الأعلى.
block.repair-point.description = يصلح باستمرار أقرب وحدة متضررة في محيطه.
block.segment.description = يضر ويدمر المقذوفات القادمة. لا يستهدف مقذوفات الليزر.
block.parallax.description = يطلق شعاع جر يسحب الأهداف الجوية، ويضرها في هذه العملية.
block.tsunami.description = يطلق تيارات قوية من السائل على الأعداء. يطفئ الحرائق تلقائيًا عند تزويده بالماء.
block.silicon-crucible.description = يكرر السيليكون من الرمل والفحم، باستخدام البيراتيت كمصدر حرارة إضافي. أكثر كفاءة في المواقع الساخنة.
block.disassembler.description = يفصل الخبث المنصهر إلى كميات ضئيلة من المكونات المعدنية النادرة بكفاءة منخفضة. يمكنه إنتاج الثوريوم.
block.overdrive-dome.description = يزيد من سرعة المباني القريبة. يتطلب قماش الطور والسيليكون للعمل. لا يتراكم.
block.payload-conveyor.description = ينقل حمولات كبيرة، مثل الوحدات من المصانع. مغناطيسي. قابل للاستخدام في بيئات انعدام الجاذبية.
block.payload-router.description = يقسّم حمولات الإدخال إلى 3 اتجاهات إخراج. يعمل كفارز عند تعيين مرشح. مغناطيسي. قابل للاستخدام في بيئات انعدام الجاذبية.
block.ground-factory.description = ينتج وحدات برية. يمكن استخدام الوحدات الناتجة مباشرة، أو نقلها إلى أجهزة إعادة البناء للترقية.
block.air-factory.description = ينتج وحدات جوية. يمكن استخدام الوحدات الناتجة مباشرة، أو نقلها إلى أجهزة إعادة البناء للترقية.
block.naval-factory.description = ينتج وحدات بحرية. يمكن استخدام الوحدات الناتجة مباشرة، أو نقلها إلى أجهزة إعادة البناء للترقية.
block.additive-reconstructor.description = يرقي الوحدات المدخلة إلى الفئة الثانية.
block.multiplicative-reconstructor.description = يرقي الوحدات المدخلة إلى الفئة الثالثة.
block.exponential-reconstructor.description = يرقي الوحدات المدخلة إلى الفئة الرابعة.
block.tetrative-reconstructor.description = يرقي الوحدات المدخلة إلى الفئة الخامسة والأخيرة.
block.switch.description = مفتاح قابل للتبديل. يمكن قراءة حالته والتحكم بها بواسطة معالجات المنطق.
block.micro-processor.description = يشغّل سلسلة من تعليمات المنطق في حلقة. يمكن استخدامه للتحكم بالوحدات والمباني.
block.logic-processor.description = يشغّل سلسلة من تعليمات المنطق في حلقة. يمكن استخدامه للتحكم بالوحدات والمباني. أسرع من المعالج الصغير.
block.hyper-processor.description = يشغّل سلسلة من تعليمات المنطق في حلقة. يمكن استخدامه للتحكم بالوحدات والمباني. أسرع من معالج المنطق.
block.memory-cell.description = يخزن معلومات لمعالج المنطق.
block.memory-bank.description = يخزن معلومات لمعالج المنطق. سعة عالية.
block.logic-display.description = يعرض رسومات تعسفية من معالج المنطق.
block.large-logic-display.description = يعرض رسومات تعسفية من معالج المنطق.
block.tile-logic-display.description = يعرض رسومات تعسفية من معالج المنطق.\nيتصل بسلاسة مع كتل الشاشات المبلطة القريبة.
block.interplanetary-accelerator.description = برج مدفع مغناطيسي كهربائي ضخم. يسرّع الأنوية إلى سرعة الإفلات للانتشار بين الكواكب.
block.repair-turret.description = يصلح باستمرار أقرب وحدة متضررة في محيطه. يقبل المبرد اختياريًا.

#Erekir
block.core-bastion.description = نواة القاعدة. مدرعة. بمجرد تدميرها، يُفقد القطاع.
block.core-citadel.description = نواة القاعدة. مدرعة جيدًا جدًا. تخزن موارد أكثر من نواة Bastion.
block.core-acropolis.description = نواة القاعدة. مدرعة بشكل استثنائي. تخزن موارد أكثر من نواة Citadel.
block.breach.description = يطلق طلقات نافذة على أهداف العدو.
block.diffuse.description = يطلق دفعات من الطلقات في مخروط واسع. يدفع أهداف العدو للخلف.
block.sublimate.description = يطلق نفاثة نار مستمرة على أهداف العدو. تخترق الدروع.
block.titan.description = يطلق قذائف مدفعية متفجرة ضخمة على الأهداف البرية. يتطلب الهيدروجين.
block.afflict.description = يطلق كرات شحنة ضخمة من الشظايا المجزأة. يتطلب التسخين.
block.disperse.description = يطلق دفعات من الشظايا على الأهداف الجوية.
block.lustre.description = يطلق ليزرًا مستمرًا بطيء الحركة أحادي الهدف على أهداف العدو.
block.scathe.description = يطلق صواريخ قوية على الأهداف البرية عبر مسافات شاسعة.
block.smite.description = يطلق دفعات من الطلقات النافذة الباعثة للبرق.
block.malign.description = يطلق وابلًا من شحنات الليزر الموجهة على أهداف العدو. يتطلب تسخينًا مكثفًا.
block.silicon-arc-furnace.description = يكرر السيليكون من الرمل والغرافيت.
block.oxidation-chamber.description = يحول البيريليوم والأوزون إلى أكسيد. يبعث الحرارة كناتج ثانوي.
block.electric-heater.description = يطبق الحرارة على المنشآت. يتطلب كميات كبيرة من الطاقة.
block.slag-heater.description = يطبق الحرارة على المنشآت. يتطلب خبثًا منصهرًا.
block.phase-heater.description = يطبق الحرارة على المنشآت. يتطلب قماش الطور.
block.heat-redirector.description = يعيد توجيه الحرارة المتراكمة إلى كتل أخرى.
block.small-heat-redirector.description = يعيد توجيه الحرارة المتراكمة إلى كتل أخرى.
block.heat-router.description = ينشر الحرارة المتراكمة في ثلاثة اتجاهات إخراج.
block.electrolyzer.description = يقسّم الماء إلى هيدروجين وغاز الأوزون. يخرج الغازات الناتجة في اتجاهين متعاكسين، محددين بألوان مطابقة.
block.atmospheric-concentrator.description = يركّز النيتروجين من الغلاف الجوي. يتطلب حرارة.
block.surge-crucible.description = ينشئ سبيكة الطفرة من السيليكون والمعادن المكونة للخبث المنصهر. يتطلب حرارة.
block.phase-synthesizer.description = يصنّع قماش الطور من الثوريوم والرمل والأوزون. يتطلب حرارة.
block.carbide-crucible.description = يدمج الغرافيت والتنغستن لتكوين الكربيد. يتطلب حرارة.
block.cyanogen-synthesizer.description = يصنّع السيانوجين من الأركيسايت والغرافيت. يتطلب حرارة.
block.slag-incinerator.description = يحرق العناصر أو السوائل غير المتطايرة. يتطلب خبثًا منصهرًا.
block.vent-condenser.description = يكثف غازات الفتحات إلى ماء. يستهلك طاقة.
block.plasma-bore.description = عند وضعه في مواجهة جدار خام، يُخرج عناصر إلى ما لا نهاية. يتطلب كميات صغيرة من الطاقة.\nيمكنه اختياريًا استخدام الهيدروجين لتعزيز الكفاءة.
block.large-plasma-bore.description = مثقاب بلازما أكبر. قادر على تعدين التنغستن والثوريوم. يتطلب الهيدروجين والطاقة.\nيمكنه اختياريًا استخدام النيتروجين لتعزيز الكفاءة.
block.cliff-crusher.description = يسحق الجدران، ويخرج الرمل إلى ما لا نهاية. يتطلب طاقة. تختلف الكفاءة حسب نوع الجدار.
block.large-cliff-crusher.description = يسحق الجدران، ويخرج الرمل إلى ما لا نهاية. يتطلب طاقة وهيدروجين. تختلف الكفاءة حسب نوع الجدار. يستهلك اختياريًا الغرافيت لزيادة الكفاءة.
block.impact-drill.description = عند وضعه على خام، يُخرج عناصر على دفعات إلى ما لا نهاية. يتطلب طاقة وماء.\nيمكنه اختياريًا استخدام الأوزون لتعزيز الكفاءة.
block.eruption-drill.description = مثقاب ارتطام محسّن. قادر على تعدين الثوريوم. يتطلب الهيدروجين.\nيمكنه اختياريًا استخدام السيانوجين لتعزيز الكفاءة.
block.reinforced-conduit.description = ينقل السوائل إلى الأمام. لا يقبل مدخلات غير أنبوبية من الجوانب.
block.reinforced-liquid-router.description = يوزع السوائل بالتساوي على جميع الجوانب.
block.reinforced-liquid-tank.description = يخزن كمية كبيرة من السوائل.
block.reinforced-liquid-container.description = يخزن كمية كبيرة من السوائل.
block.reinforced-bridge-conduit.description = ينقل السوائل فوق المنشآت والتضاريس.
block.reinforced-pump.description = يضخ ويخرج السوائل. يتطلب الهيدروجين.
block.beryllium-wall.description = يحمي المنشآت من مقذوفات العدو.
block.beryllium-wall-large.description = يحمي المنشآت من مقذوفات العدو.
block.tungsten-wall.description = يحمي المنشآت من مقذوفات العدو.
block.tungsten-wall-large.description = يحمي المنشآت من مقذوفات العدو.
block.carbide-wall.description = يحمي المنشآت من مقذوفات العدو.
block.carbide-wall-large.description = يحمي المنشآت من مقذوفات العدو.
block.reinforced-surge-wall.description = يحمي المنشآت من مقذوفات العدو، ويطلق أقواسًا كهربائية دوريًا عند التلامس.
block.reinforced-surge-wall-large.description = يحمي المنشآت من مقذوفات العدو، ويطلق أقواسًا كهربائية دوريًا عند التلامس.
block.shielded-wall.description = يحمي المنشآت من مقذوفات العدو، ويعكس معظم الطلقات عند الارتطام. ينشر درعًا يمتص معظم المقذوفات عند توفر الطاقة. يوصّل الطاقة.
block.blast-door.description = جدار يفتح عندما تكون وحدات برية صديقة ضمن النطاق. لا يمكن التحكم به يدويًا.
block.duct.description = ينقل العناصر إلى الأمام. قادر فقط على تخزين عنصر واحد.
block.armored-duct.description = ينقل العناصر إلى الأمام. لا يقبل مدخلات غير قناتية من الجوانب.
block.duct-router.description = يوزع العناصر بالتساوي عبر ثلاثة اتجاهات. يقبل العناصر فقط من الجانب الخلفي. يمكن ضبطه كفارز عناصر.
block.overflow-duct.description = يُخرج العناصر إلى الجوانب فقط إذا كان المسار الأمامي مسدودًا.
block.duct-bridge.description = ينقل العناصر فوق المنشآت والتضاريس.
block.duct-unloader.description = يفرّغ العنصر المحدد من الكتلة خلفه. لا يمكنه التفريغ من الأنوية.
block.underflow-duct.description = عكس القناة الفائضة. يخرج إلى الأمام إذا كانت المسارات اليسرى واليمنى مسدودة.
block.reinforced-liquid-junction.description = يعمل كوصلة بين أنبوبين متقاطعين.
block.surge-conveyor.description = ينقل العناصر على دفعات. يمكن تسريعه بالطاقة. يوصّل الطاقة.
block.surge-router.description = يوزع العناصر بالتساوي في ثلاثة اتجاهات من ناقلات الطفرة. يمكن تسريعه بالطاقة. يوصّل الطاقة.
block.unit-cargo-loader.description = يصنع طائرات شحن مسيّرة. توزع الطائرات العناصر تلقائيًا على نقاط تفريغ الشحن ذات المرشح المطابق.
block.unit-cargo-unload-point.description = يعمل كنقطة تفريغ لطائرات الشحن المسيّرة. يقبل العناصر المطابقة للمرشح المحدد.
block.beam-node.description = ينقل الطاقة إلى كتل أخرى بشكل عمودي. يخزن كمية صغيرة من الطاقة.
block.beam-tower.description = ينقل الطاقة إلى كتل أخرى بشكل عمودي. يخزن كمية كبيرة من الطاقة. بعيد المدى.
block.beam-link.description = ينقل الطاقة عبر مسافات شاسعة.\nقادر فقط على الاتصال بالمنشآت المجاورة أو روابط الشعاع الأخرى.
block.turbine-condenser.description = يولّد الطاقة عند وضعه على الفتحات. ينتج كمية صغيرة من الماء.
block.chemical-combustion-chamber.description = يولّد الطاقة من الأركيسايت والأوزون.
block.pyrolysis-generator.description = يولّد كميات كبيرة من الطاقة من الأركيسايت والخبث المنصهر. ينتج الماء كناتج ثانوي.
block.flux-reactor.description = يولّد كميات كبيرة من الطاقة عند التسخين. يتطلب السيانوجين كمثبت. إخراج الطاقة ومتطلبات السيانوجين متناسبان مع مدخل الحرارة.\nينفجر إذا لم يُزوَّد بكمية كافية من السيانوجين.
block.neoplasia-reactor.description = يستخدم الأركيسايت والماء وقماش الطور لتوليد كميات كبيرة من الطاقة. ينتج الحرارة والنيوبلازم الخطير كناتج ثانوي.\nينفجر بعنف إذا لم تتم إزالة النيوبلازم من المفاعل عبر الأنابيب.
block.build-tower.description = يعيد بناء المنشآت تلقائيًا ضمن النطاق ويساعد الوحدات الأخرى في البناء.
block.regen-projector.description = يصلح ببطء المنشآت الصديقة ضمن محيط مربع. يتطلب الهيدروجين.\nيمكنه اختياريًا استخدام قماش الطور لتعزيز الكفاءة.
block.reinforced-container.description = يخزن كمية صغيرة من العناصر. يمكن استرجاع المحتويات عبر المفرّغات. لا يزيد من سعة تخزين النواة.
block.reinforced-vault.description = يخزن كمية كبيرة من العناصر. يمكن استرجاع المحتويات عبر المفرّغات. لا يزيد من سعة تخزين النواة.
block.tank-fabricator.description = يصنّع وحدات Stell. يمكن استخدام الوحدات الناتجة مباشرة، أو نقلها إلى أجهزة إعادة التصنيع للترقية.
block.ship-fabricator.description = يصنّع وحدات Elude. يمكن استخدام الوحدات الناتجة مباشرة، أو نقلها إلى أجهزة إعادة التصنيع للترقية.
block.mech-fabricator.description = يصنّع وحدات Merui. يمكن استخدام الوحدات الناتجة مباشرة، أو نقلها إلى أجهزة إعادة التصنيع للترقية.
block.tank-assembler.description = يجمّع دبابات كبيرة من الكتل والوحدات المدخلة. يمكن زيادة فئة الإخراج بإضافة وحدات تجميع.
block.ship-assembler.description = يجمّع سفنًا كبيرة من الكتل والوحدات المدخلة. يمكن زيادة فئة الإخراج بإضافة وحدات تجميع.
block.mech-assembler.description = يجمّع آليات كبيرة من الكتل والوحدات المدخلة. يمكن زيادة فئة الإخراج بإضافة وحدات تجميع.
block.tank-refabricator.description = يرقي وحدات الدبابات المدخلة إلى الفئة الثانية.
block.ship-refabricator.description = يرقي وحدات السفن المدخلة إلى الفئة الثانية.
block.mech-refabricator.description = يرقي وحدات الآليات المدخلة إلى الفئة الثانية.
block.prime-refabricator.description = يرقي الوحدات المدخلة إلى الفئة الثالثة.
block.basic-assembler-module.description = يزيد من فئة المجمّع عند وضعه بجانب حدود بناء. يتطلب طاقة. يمكن استخدامه كمدخل حمولة.
block.small-deconstructor.description = يفكك المنشآت والوحدات المدخلة. يعيد 100% من تكلفة البناء.
block.reinforced-payload-conveyor.description = ينقل الحمولات إلى الأمام.
block.reinforced-payload-router.description = يوزع الحمولات إلى الكتل المجاورة. يعمل كفارز عند تعيين مرشح.
block.payload-mass-driver.description = منشأة نقل حمولة بعيدة المدى. تطلق الحمولات المستقبلة إلى دوافع كتلة حمولة أخرى مرتبطة.
block.large-payload-mass-driver.description = منشأة نقل حمولة بعيدة المدى. تطلق الحمولات المستقبلة إلى دوافع كتلة حمولة أخرى مرتبطة.
block.unit-repair-tower.description = يصلح جميع الوحدات في محيطه. يتطلب الأوزون.
block.radar.description = يكشف التضاريس ووحدات العدو تدريجيًا ضمن نطاق واسع. يتطلب طاقة.
block.shockwave-tower.description = يضر ويدمر مقذوفات العدو ضمن نطاق. يتطلب السيانوجين.
block.canvas.description = يعرض صورة بسيطة بلوحة ألوان محددة مسبقًا. قابلة للتعديل.
block.large-canvas.description = يعرض صورة بسيطة بلوحة ألوان محددة مسبقًا. قابلة للتعديل.

unit.dagger.description = يطلق طلقات عادية على أهداف العدو.
unit.mace.description = يطلق تيارات من اللهب على أهداف العدو.
unit.fortress.description = يطلق مدفعية بعيدة المدى على الأهداف البرية للعدو.
unit.scepter.description = يطلق وابلًا من الطلقات المشحونة على أهداف العدو.
unit.reign.description = يطلق وابلًا من الطلقات النافذة الضخمة على أهداف العدو.
unit.nova.description = يطلق شحنات ليزر تضر أهداف العدو وتصلح المنشآت الصديقة. قادر على الطيران.
unit.pulsar.description = يطلق أقواسًا كهربائية تضر أهداف العدو وتصلح المنشآت الصديقة. قادر على الطيران.
unit.quasar.description = يطلق أشعة ليزر نافذة تضر أهداف العدو وتصلح المنشآت الصديقة. قادر على الطيران. مدرّع بدرع.
unit.vela.description = يطلق شعاع ليزر ضخمًا مستمرًا يضر أهداف العدو، ويسبب حرائق، ويصلح المنشآت الصديقة. قادر على الطيران.
unit.corvus.description = يطلق انفجار ليزر ضخمًا يضر أهداف العدو ويصلح المنشآت الصديقة. يمكنه السير فوق معظم التضاريس.
unit.crawler.description = يتحرك نحو أهداف العدو وينفجر ذاتيًا، مسببًا انفجارًا كبيرًا.
unit.atrax.description = يطلق كرات موهنة من الخبث المنصهر على الأهداف البرية. يمكنه السير فوق معظم التضاريس.
unit.spiroct.description = يطلق أشعة ليزر ماصة على أهداف العدو، ويصلح نفسه في هذه العملية. يمكنه السير فوق معظم التضاريس.
unit.arkyid.description = يطلق أشعة ليزر ماصة كبيرة على أهداف العدو، ويصلح نفسه في هذه العملية. يمكنه السير فوق معظم التضاريس.
unit.toxopid.description = يطلق قذائف عنقودية كهربائية كبيرة وليزر نافذ على أهداف العدو. يمكنه السير فوق معظم التضاريس.
unit.flare.description = يطلق طلقات عادية على الأهداف البرية للعدو.
unit.horizon.description = يُسقط مجموعات من القنابل على الأهداف البرية للعدو.
unit.zenith.description = يطلق دفعات من الصواريخ على أهداف العدو.
unit.antumbra.description = يطلق وابلًا من الطلقات على أهداف العدو.
unit.eclipse.description = يطلق شعاعي ليزر نافذين ووابلًا من الشظايا على أهداف العدو.
unit.mono.description = يعدّن النحاس والرصاص تلقائيًا، ويودعهما في النواة.
unit.poly.description = يعيد بناء المنشآت المدمرة تلقائيًا ويساعد الوحدات الأخرى في البناء.
unit.mega.description = يصلح المنشآت المتضررة تلقائيًا. قادر على حمل الكتل والوحدات البرية الصغيرة.
unit.quad.description = يُسقط قنابل بلازما على الأهداف البرية، ويصلح المنشآت الصديقة ويضر الأهداف البرية للعدو. قادر على حمل وحدات برية متوسطة الحجم.
unit.oct.description = يحمي الحلفاء القريبين بدرع متجدد. قادر على حمل معظم الوحدات البرية.
unit.risso.description = يطلق وابلًا من الصواريخ والطلقات على أهداف العدو.
unit.minke.description = يطلق قذائف وطلقات عادية على الأهداف البرية للعدو.
unit.bryde.description = يطلق قذائف مدفعية وصواريخ بعيدة المدى على أهداف العدو.
unit.sei.description = يطلق وابلًا من الصواريخ والطلقات الخارقة للدروع على أهداف العدو.
unit.omura.description = يطلق طلقة مدفع كهرومغناطيسي نافذة بعيدة المدى على أهداف العدو.
unit.alpha.description = يدافع عن نواة Shard ضد الأعداء. يبني المنشآت.
unit.beta.description = يدافع عن نواة Foundation ضد الأعداء. يبني المنشآت.
unit.gamma.description = يدافع عن نواة Nucleus ضد الأعداء. يبني المنشآت.
unit.retusa.description = يطلق طوربيدات موجهة على أهداف العدو. يصلح الوحدات الصديقة.
unit.oxynoe.description = يطلق تيارات لهب مصلحة للمنشآت على أهداف العدو. يستهدف مقذوفات العدو ببرج دفاع نقطي.
unit.cyerce.description = يطلق صواريخ عنقودية باحثة على أهداف العدو. يصلح الوحدات الصديقة.
unit.aegires.description = يصعق جميع وحدات ومنشآت العدو التي تدخل حقل طاقته. يصلح جميع الحلفاء.
unit.navanax.description = يطلق مقذوفات EMP متفجرة، ملحقًا ضررًا كبيرًا بشبكات طاقة العدو ومصلحًا المنشآت الصديقة. يذيب أهداف العدو بأربعة أبراج ليزر ذاتية التحكم.

#Erekir
unit.stell.description = يطلق طلقات عادية على أهداف العدو.
unit.locus.description = يطلق طلقات متبادلة على أهداف العدو.
unit.precept.description = يطلق طلقات عنقودية نافذة على أهداف العدو. أقل تأثرًا بمقاومة السوائل.
unit.vanquish.description = يطلق طلقات كبيرة نافذة ومنقسمة على أهداف العدو. أقل تأثرًا بمقاومة السوائل.
unit.conquer.description = يطلق سلاسل طلقات نافذة كبيرة على أهداف العدو. أقل تأثرًا بشكل كبير بمقاومة السوائل.
unit.merui.description = يطلق مدفعية بعيدة المدى على الأهداف البرية للعدو. يمكنه السير فوق معظم التضاريس.
unit.cleroi.description = يطلق قذيفتين متزامنتين على أهداف العدو. يستهدف مقذوفات العدو بأبراج دفاع نقطي. يمكنه السير فوق معظم التضاريس.
unit.anthicus.description = يطلق صواريخ موجهة بعيدة المدى على أهداف العدو. يمكنه السير فوق معظم التضاريس.
unit.tecta.description = يطلق صواريخ بلازما موجهة على أهداف العدو. يحمي نفسه بدرع اتجاهي. يمكنه السير فوق معظم التضاريس.
unit.collaris.description = يطلق مدفعية مجزئة بعيدة المدى على أهداف العدو. يمكنه السير فوق معظم التضاريس.
unit.elude.description = يطلق أزواجًا من الطلقات الموجهة على أهداف العدو. يمكنه التحليق فوق مسطحات السوائل.
unit.avert.description = يطلق أزواجًا متعرجة من الطلقات على أهداف العدو.
unit.obviate.description = يطلق أزواجًا متعرجة من كرات البرق على أهداف العدو.
unit.quell.description = يطلق صواريخ موجهة بعيدة المدى بدرع بلازما غير مستقر على أهداف العدو. يعطل كتل إصلاح منشآت العدو. يهاجم الأهداف البرية فقط.
unit.disrupt.description = يطلق صواريخ تعطيل موجهة بعيدة المدى على أهداف العدو. يعطل كتل إصلاح منشآت العدو. يهاجم الأهداف البرية فقط.
unit.evoke.description = يبني منشآت للدفاع عن نواة Bastion. يصلح المنشآت بشعاع. قادر على حمل منشآت 2×2.
unit.incite.description = يبني منشآت للدفاع عن نواة Citadel. يصلح المنشآت بشعاع. قادر على حمل منشآت 2×2.
unit.emanate.description = يبني منشآت للدفاع عن نواة Acropolis. يصلح المنشآت بأشعة. قادر على حمل منشآت 2×2.

lst.read = يقرأ رقمًا من خلية ذاكرة مرتبطة.\nيمكنه أيضًا القراءة من متغيرات في معالجات أخرى.
lst.write = يكتب رقمًا إلى خلية ذاكرة مرتبطة.\nيمكنه أيضًا الكتابة إلى متغيرات في معالجات أخرى.
lst.print = يضيف نصًا إلى مخزن الطباعة المؤقت.\nلا يعرض شيئًا حتى يُستخدم [accent]تفريغ الطباعة[].
lst.printchar = يضيف حرف UTF-16 أو أيقونة محتوى إلى مخزن الطباعة المؤقت.\nلا يعرض شيئًا حتى يُستخدم [accent]تفريغ الطباعة[].
lst.format = يستبدل العنصر النائب التالي في مخزن النص المؤقت بقيمة.\nلا يفعل شيئًا إذا كان نمط العنصر النائب غير صالح.\nنمط العنصر النائب: "{[accent]رقم 0-9[]}"\nمثال:\n[accent]print "test {0}"\nformat "example"
lst.draw = يضيف عملية إلى مخزن الرسم المؤقت.\nلا يعرض شيئًا حتى يُستخدم [accent]تفريغ الرسم[].
lst.drawflush = يفرّغ عمليات [accent]الرسم[] المتراكمة إلى شاشة.
lst.printflush = يفرّغ عمليات [accent]الطباعة[] المتراكمة إلى كتلة رسالة.
lst.getlink = يحصل على رابط معالج حسب الفهرس. يبدأ من 0.
lst.control = يتحكم بمبنى.
lst.radar = يحدد موقع الوحدات حول مبنى ضمن نطاق.
lst.sensor = يحصل على بيانات من مبنى أو وحدة.
lst.set = يعيّن متغيرًا.
lst.operation = ينفّذ عملية على متغير أو متغيرين.
lst.select = يعيّن متغيرًا شرطيًا إلى إحدى قيمتين.
lst.end = يقفز إلى أعلى مكدس التعليمات.
lst.wait = ينتظر عددًا معينًا من الثواني.
lst.stop = يوقف تنفيذ هذا المعالج.
lst.lookup = يبحث عن نوع عنصر/سائل/وحدة/كتلة حسب المعرّف.\nيمكن الوصول إلى العدد الإجمالي لكل نوع باستخدام:\n[accent]@unitCount[] / [accent]@itemCount[] / [accent]@liquidCount[] / [accent]@blockCount[]\nللعملية العكسية، استشعر [accent]@id[] الخاص بالكائن.
lst.jump = يقفز شرطيًا إلى عبارة أخرى.
lst.unitbind = يرتبط بالوحدة التالية من نوع معين، ويخزنها في [accent]@unit[].
lst.unitcontrol = يتحكم بالوحدة المرتبطة حاليًا.
lst.unitradar = يحدد موقع الوحدات حول الوحدة المرتبطة حاليًا.
lst.unitlocate = يحدد موقع نوع معين من المواقع/المباني في أي مكان على الخريطة.\nيتطلب وحدة مرتبطة.
lst.getblock = يحصل على بيانات البلاطة في أي موقع.
lst.setblock = يعيّن بيانات البلاطة في أي موقع.
lst.spawnunit = يولّد وحدة في موقع.
lst.spawnbullet = يولّد طلقة في موقع.
lst.applystatus = يطبق أو يزيل تأثير حالة من وحدة.
lst.weathersense = يتحقق مما إذا كان نوع من الطقس نشطًا.
lst.weatherset = يعيّن الحالة الحالية لنوع من الطقس.
lst.spawnwave = يولّد موجة.
lst.explosion = ينشئ انفجارًا في موقع.
lst.setrate = يعيّن سرعة تنفيذ المعالج بالتعليمات/دورة.
lst.fetch = يبحث عن الوحدات أو الأنوية أو اللاعبين أو المباني حسب الفهرس.\nتبدأ الفهارس من 0 وتنتهي عند العدد المُرجَع.
lst.packcolor = يحزم مكونات RGBA بنطاق [0، 1] في رقم واحد للرسم أو ضبط القواعد.
lst.unpackcolor = يفكك مكونات RGBA من لون تم حزمه باستخدام حزم اللون.
lst.setrule = يعيّن قاعدة لعبة.
lst.flushmessage = يعرض رسالة على الشاشة من مخزن النص المؤقت.\nإذا كان متغير نتيجة النجاح هو [accent]@wait[]،\nسينتظر حتى تنتهي الرسالة السابقة.\nوإلا، يُخرج ما إذا نجح عرض الرسالة.
lst.cutscene = يتحكم بكاميرا اللاعب.
lst.setflag = يعيّن علامة عامة يمكن لجميع المعالجات قراءتها.
lst.getflag = يتحقق مما إذا كانت علامة عامة معيّنة.
lst.setprop = يعيّن خاصية لوحدة أو مبنى.
lst.effect = ينشئ تأثير جسيمات.
lst.sync = يزامن متغيرًا عبر الشبكة.\nمحدود بـ 20 مرة في الثانية لكل متغير.
lst.playsound = يشغّل صوتًا.\nيمكن أن يكون مستوى الصوت والاتجاه قيمة عامة، أو محسوبة بناءً على الموقع.
lst.playmusic = يشغّل مقطوعة موسيقية بالاسم، مثل [accent]\"game1\"[].\nإذا كانت قيمة [accent]interrupt[] صحيحة، ستتوقف الموسيقى المشغلة سابقًا.\nتشغيل موسيقى فارغة (null) مع تعيين interrupt إلى صحيح سيوقف المقطوعة الحالية.\nلاحظ أن الموسيقى من حزم البيانات يجب أن تُسبق بـ [accent]dp-[].
lst.makemarker = ينشئ علامة منطق جديدة في العالم.\nيجب توفير معرّف لتحديد هذه العلامة.\nالعلامات محدودة حاليًا بـ 20,000 لكل عالم.
lst.setmarker = يعيّن خاصية لعلامة.\nيجب أن يكون المعرّف المستخدم نفسه المستخدم في تعليمة إنشاء العلامة.\nيتم تجاهل القيم [accent]null [].
lst.localeprint = يضيف قيمة خاصية لغة الخريطة إلى مخزن النص المؤقت.\nلضبط حزم لغة الخريطة في محرر الخرائط، تحقق من [accent]معلومات الخريطة > حزم اللغة[].\nإذا كان العميل جهازًا محمولًا، يحاول طباعة خاصية تنتهي بـ ".mobile" أولًا.
lst.query = يستعلم عن الوحدات/المباني في منطقة محددة.\nتُخرج النتائج إلى [accent]@queries[].\nيمكن قراءة النتائج من [accent]@queries[] باستخدام تعليمة [accent]القراءة[] وفهرس.\nيمكن استشعار طول [accent]@queries[] باستخدام [accent]@size[] كمعامل.

lglobal.false = 0
lglobal.true = 1
lglobal.null = null
lglobal.@pi = الثابت الرياضي pi (3.141...)
lglobal.@e = الثابت الرياضي e (2.718...)
lglobal.@degToRad = اضرب بهذا الرقم لتحويل الدرجات إلى راديان
lglobal.@radToDeg = اضرب بهذا الرقم لتحويل الراديان إلى درجات

lglobal.@time = وقت اللعب للحفظ الحالي، بالمللي ثانية
lglobal.@tick = وقت اللعب للحفظ الحالي، بالدورات (1 ثانية = 60 دورة)
lglobal.@second = وقت اللعب للحفظ الحالي، بالثواني
lglobal.@minute = وقت اللعب للحفظ الحالي، بالدقائق
lglobal.@waveNumber = رقم الموجة الحالية، إذا كانت الموجات مفعّلة
lglobal.@waveTime = عداد تنازلي للموجات، بالثواني
lglobal.@mapw = عرض الخريطة بالبلاطات
lglobal.@maph = ارتفاع الخريطة بالبلاطات

lglobal.sectionMap = الخريطة
lglobal.sectionGeneral = عام
lglobal.sectionNetwork = الشبكة/جانب العميل [معالج العالم فقط]
lglobal.sectionProcessor = المعالج
lglobal.sectionLookup = البحث

lglobal.@this = كتلة المنطق التي تنفّذ الكود
lglobal.@thisx = إحداثي X لكتلة تنفيذ الكود
lglobal.@thisy = إحداثي Y لكتلة تنفيذ الكود
lglobal.@links = العدد الإجمالي للكتل المرتبطة بهذا المعالج
lglobal.@ipt = سرعة تنفيذ المعالج بالتعليمات لكل دورة (60 دورة = 1 ثانية)

lglobal.@unitCount = العدد الإجمالي لأنواع محتوى الوحدات في اللعبة؛ يُستخدم مع تعليمة البحث
lglobal.@blockCount = العدد الإجمالي لأنواع محتوى الكتل في اللعبة؛ يُستخدم مع تعليمة البحث
lglobal.@itemCount = العدد الإجمالي لأنواع محتوى العناصر في اللعبة؛ يُستخدم مع تعليمة البحث
lglobal.@liquidCount = العدد الإجمالي لأنواع محتوى السوائل في اللعبة؛ يُستخدم مع تعليمة البحث

lglobal.@server = صحيح إذا كان الكود يعمل على خادم أو في وضع لاعب واحد، وإلا خطأ
lglobal.@client = صحيح إذا كان الكود يعمل على عميل متصل بخادم

lglobal.@clientLocale = لغة العميل الذي يشغّل الكود. مثال: en_US
lglobal.@clientUnit = وحدة العميل الذي يشغّل الكود
lglobal.@clientName = اسم لاعب العميل الذي يشغّل الكود
lglobal.@clientTeam = معرّف فريق العميل الذي يشغّل الكود
lglobal.@clientMobile = صحيح إذا كان العميل الذي يشغّل الكود على جهاز محمول، وإلا خطأ

lenum.type = نوع المبنى/الوحدة.\nمثال: لأي موجّه، سيُرجع هذا [accent]@router[].\nليس نصًا.
lenum.shoot = يطلق النار على موقع.
lenum.shootp = يطلق النار على وحدة/مبنى مع توقع السرعة.
lenum.config = تهيئة المبنى، مثل عنصر الفارز.
lenum.enabled = ما إذا كانت الكتلة مفعّلة.

laccess.currentammotype = نوع الذخيرة الحالي (عنصر/سائل) لبرج.
laccess.memorycapacity = عدد الخلايا في كتلة ذاكرة.
laccess.color = لون المضيء.
laccess.controller = المتحكم بالوحدة. إذا كان يتحكم بها معالج، يُرجع المعالج.\nوإلا، يُرجع الوحدة نفسها.
laccess.dead = ما إذا كانت الوحدة/المبنى ميتة أو لم تعد صالحة.
laccess.controlled = يُرجع:\n[accent]@ctrlProcessor[] إذا كان المتحكم بالوحدة معالجًا\n[accent]@ctrlPlayer[] إذا كان المتحكم بالوحدة/المبنى لاعبًا\n[accent]@ctrlCommand[] إذا كان المتحكم بالوحدة أمر لاعب\nوإلا، 0.
laccess.progress = تقدم الإجراء، من 0 إلى 1.\nيُرجع تقدم الإنتاج أو إعادة تحميل البرج أو البناء.
laccess.speed = السرعة القصوى للوحدة، بالبلاطات/ثانية.
laccess.size = حجم الوحدة/المبنى أو طول النص.
laccess.id = معرّف الوحدة/الكتلة/العنصر/السائل.\nهذا هو العملية العكسية لعملية البحث.
laccess.displaywidth = عرض كتلة شاشة بالبكسل.
laccess.displayheight = ارتفاع كتلة شاشة بالبكسل.
laccess.buffersize = للرسائل: طول المحتويات.\nللشاشات: عدد أوامر الرسومات غير المعالجة.
laccess.operations = عدد العمليات المنفذة على الكتلة.\nللشاشات، يُرجع عدد عمليات تفريغ الرسم.
laccess.maxunits = الحد الأقصى للوحدات التي يمكن أن يمتلكها فريق.\nيمكن استشعاره فقط من الأنوية.

lcategory.unknown = غير معروف
lcategory.unknown.description = تعليمات غير مصنّفة.
lcategory.io = الإدخال والإخراج
lcategory.io.description = تعديل محتويات كتل الذاكرة ومخازن المعالج المؤقتة.
lcategory.block = التحكم بالكتل
lcategory.block.description = التفاعل مع الكتل.
lcategory.operation = العمليات
lcategory.operation.description = عمليات منطقية.
lcategory.control = التحكم بالتدفق
lcategory.control.description = إدارة ترتيب التنفيذ.
lcategory.unit = التحكم بالوحدات
lcategory.unit.description = إعطاء الوحدات أوامر.
lcategory.world = العالم
lcategory.world.description = التحكم في سلوك العالم.

graphicstype.clear = يملأ الشاشة بلون.
graphicstype.color = يعيّن اللون لعمليات الرسم التالية.
graphicstype.col = مكافئ للون، لكن مضغوط.\nتُكتب الألوان المضغوطة كرموز سداسية عشرية مع بادئة [accent]%[].\nمثال: [accent]%ff0000[] يمثل اللون الأحمر.
graphicstype.stroke = يعيّن عرض الخط.
graphicstype.line = يرسم قطعة خط.
graphicstype.rect = يملأ مستطيلًا.
graphicstype.linerect = يرسم إطار مستطيل.
graphicstype.poly = يملأ مضلعًا منتظمًا.
graphicstype.linepoly = يرسم إطار مضلع منتظم.
graphicstype.triangle = يملأ مثلثًا.
graphicstype.image = يرسم صورة لمحتوى ما أو ينسخ شاشة أخرى.\nمثال محتوى: [accent]@router[]، [accent]@dagger[] أو شاشة [accent]display1[].
graphicstype.print = يرسم نصًا من مخزن الطباعة المؤقت.\nتُسمح فقط بأحرف ASCII.\nيمسح مخزن الطباعة المؤقت.

lenum.always = صحيح دائمًا.
lenum.idiv = القسمة الصحيحة.
lenum.div = القسمة.\nيُرجع [accent]null[] عند القسمة على صفر.
lenum.mod = باقي القسمة.
lenum.emod = باقي القسمة الحقيقي، إشارة النتيجة تأتي من المقسوم عليه.
lenum.equal = يساوي. يحول الأنواع.\nالكائنات غير الفارغة عند مقارنتها بأرقام تصبح 1، وإلا 0.
lenum.notequal = لا يساوي. يحول الأنواع.
lenum.strictequal = مساواة صارمة. لا يحول الأنواع.\nيمكن استخدامه للتحقق من [accent]null[].
lenum.shl = إزاحة بت لليسار.
lenum.shr = إزاحة بت لليمين.
lenum.ushr = إزاحة بت لليمين غير موقعة.
lenum.or = عملية OR الثنائية.
lenum.land = عملية AND المنطقية.
lenum.and = عملية AND الثنائية.
lenum.not = قلب ثنائي.
lenum.xor = عملية XOR الثنائية.

lenum.min = أصغر رقمين.
lenum.max = أكبر رقمين.
lenum.angle = زاوية المتجه بالدرجات.
lenum.anglediff = المسافة المطلقة بين زاويتين بالدرجات.
lenum.len = طول المتجه.

lenum.sin = الجيب، بالدرجات.
lenum.cos = جيب التمام، بالدرجات.
lenum.tan = الظل، بالدرجات.

lenum.asin = قوس الجيب، بالدرجات.
lenum.acos = قوس جيب التمام، بالدرجات.
lenum.atan = قوس الظل، بالدرجات.

#not a typo, look up 'range notation'
lenum.rand = رقم عشري عشوائي ضمن النطاق [0، القيمة).
lenum.log = اللوغاريتم الطبيعي (ln).
lenum.log10 = اللوغاريتم الأساس 10.
lenum.noise = ضوضاء simplex ثنائية الأبعاد.
lenum.abs = القيمة المطلقة.
lenum.sqrt = الجذر التربيعي.

lenum.any = أي وحدة.
lenum.ally = وحدة حليفة.
lenum.attacker = وحدة مسلحة.
lenum.enemy = وحدة عدو.
lenum.boss = وحدة حارس.
lenum.flying = وحدة طائرة.
lenum.ground = وحدة برية.
lenum.player = وحدة يتحكم بها لاعب.

lenum.ore = رواسب خام.
lenum.damaged = مبنى حليف متضرر.
lenum.spawn = نقطة ظهور العدو.\nقد تكون نواة أو موقعًا.
lenum.building = مبنى في مجموعة محددة.

lenum.core = أي نواة.
lenum.storage = مبنى تخزين، مثل الخزنة.
lenum.generator = مبانٍ تولّد الطاقة.
lenum.factory = مبانٍ تحوّل الموارد.
lenum.repair = نقاط الإصلاح.
lenum.battery = أي بطارية.
lenum.resupply = نقاط إعادة التزويد.\nذات صلة فقط عند تفعيل [accent]"ذخيرة الوحدات"[].
lenum.reactor = مفاعل الارتطام/الثوريوم.
lenum.turret = أي برج.

sensor.in = المبنى/الوحدة المراد استشعاره.

radar.from = المبنى المراد الاستشعار منه.\nنطاق الاستشعار محدود بنطاق المبنى.
radar.target = مرشح للوحدات المراد استشعارها.
radar.and = مرشحات إضافية.
radar.order = ترتيب الفرز. 0 للعكس.
radar.sort = المقياس الذي يُفرز النتائج بموجبه.
radar.output = المتغير الذي تُكتب فيه الوحدة الناتجة.

unitradar.target = مرشح للوحدات المراد استشعارها.
unitradar.and = مرشحات إضافية.
unitradar.order = ترتيب الفرز. 0 للعكس.
unitradar.sort = المقياس الذي يُفرز النتائج بموجبه.
unitradar.output = المتغير الذي تُكتب فيه الوحدة الناتجة.

control.of = المبنى المراد التحكم به.
control.unit = الوحدة/المبنى المراد التصويب نحوه.
control.shoot = ما إذا كان سيتم إطلاق النار.

unitlocate.enemy = ما إذا كان سيتم تحديد موقع مباني العدو.
unitlocate.found = ما إذا تم العثور على الكائن.
unitlocate.building = متغير الإخراج للمبنى الذي تم تحديد موقعه.
unitlocate.outx = إحداثي X الناتج.
unitlocate.outy = إحداثي Y الناتج.
unitlocate.group = مجموعة المباني المراد البحث عنها.

playsound.limit = إذا كانت صحيحة، تمنع تشغيل هذا الصوت\nإذا كان قد تم تشغيله بالفعل في نفس الإطار.

lenum.idle = لا تتحرك، لكن استمر في البناء/التعدين.\nالحالة الافتراضية.
lenum.stop = توقف عن التحرك/التعدين/البناء.
lenum.unbind = عطّل التحكم بالمنطق بالكامل.\nاستأنف الذكاء الاصطناعي القياسي.
lenum.move = تحرك إلى موقع دقيق.
lenum.approach = اقترب من موقع ضمن نطاق.
lenum.pathfind = ابحث عن مسار إلى الموقع المحدد.
lenum.autopathfind = يبحث تلقائيًا عن مسار إلى أقرب نواة عدو أو نقطة إسقاط.\nهذا مماثل لبحث المسار القياسي لأعداء الموجات.
lenum.target = أطلق النار على موقع.
lenum.targetp = أطلق النار على هدف مع توقع السرعة.
lenum.itemdrop = أسقط عنصرًا.
lenum.itemtake = خذ عنصرًا من مبنى.
lenum.paydrop = أسقط الحمولة الحالية.
lenum.paytake = التقط حمولة في الموقع الحالي.
lenum.payenter = ادخل/اهبط على كتلة الحمولة التي عليها الوحدة.
lenum.flag = علامة رقمية للوحدة.
lenum.mine = عدّن في موقع.
lenum.build = ابنِ منشأة.
lenum.getblock = احصل على المبنى ونوع الأرضية والكتلة عند الإحداثيات.\nيجب أن تكون الوحدة ضمن نطاق الموقع، وإلا يُرجع null.
lenum.within = تحقق مما إذا كانت الوحدة بالقرب من موقع.
lenum.boost = ابدأ/أوقف التعزيز.

lenum.flushtext = فرّغ محتوى مخزن الطباعة المؤقت إلى علامة، إن أمكن.\nإذا تم تعيين fetch إلى صحيح، يحاول جلب خصائص من حزمة لغة الخريطة أو حزمة اللعبة.
lenum.texture = اسم النسيج مباشرة من أطلس نسيج اللعبة (باستخدام نمط تسمية kebab-case).\nإذا تم تعيين printFlush إلى صحيح، يستهلك محتوى مخزن النص المؤقت كمعامل نصي.
lenum.texturesize = حجم النسيج بالبلاطات. القيمة صفر تُحجّم عرض العلامة إلى حجم النسيج الأصلي.
lenum.autoscale = ما إذا كان سيتم تحجيم العلامة وفقًا لمستوى تكبير اللاعب.
lenum.posi = موقع مفهرس، يُستخدم لعلامات الخط والرباعي حيث يمثل الفهرس صفر الموقع الأول.
lenum.uvi = موقع النسيج ضمن النطاق من صفر إلى واحد، يُستخدم لعلامات الرباعي.
lenum.colori = لون مفهرس، يُستخدم لعلامات الخط والرباعي حيث يمثل الفهرس صفر اللون الأول.

lenum.wavetimer = ما إذا كانت الموجات تأتي تلقائيًا بمؤقت. إذا لم تكن كذلك، تأتي الموجات عند الضغط على زر التشغيل.
lenum.wave = رقم الموجة الحالية. يمكن أن يكون أي شيء في الأوضاع غير القائمة على الموجات.
lenum.currentwavetime = العد التنازلي للموجة بالدورات.
lenum.waves = ما إذا كان يمكن توليد الموجات على الإطلاق.
lenum.wavesending = ما إذا كان يمكن استدعاء الموجات يدويًا بزر التشغيل.
lenum.attackmode = يحدد ما إذا كان وضع اللعبة هو وضع الهجوم.
lenum.wavespacing = الوقت بين الموجات بالدورات.
lenum.enemycorebuildradius = منطقة حظر البناء حول نطاق نواة العدو.
lenum.dropzoneradius = النطاق حول مناطق إسقاط موجات العدو.
lenum.unitcap = الحد الأقصى الأساسي للوحدات. لا يزال يمكن زيادته بالكتل.
lenum.lighting = ما إذا كانت الإضاءة المحيطة مفعّلة.
lenum.buildspeed = مضاعف لسرعة البناء.
lenum.unithealth = مقدار الصحة التي تبدأ بها الوحدات.
lenum.unitbuildspeed = مدى سرعة بناء مصانع الوحدات للوحدات.
lenum.unitcost = مضاعف الموارد التي تتطلبها الوحدات للبناء.
lenum.unitdamage = مقدار الضرر الذي تلحقه الوحدات.
lenum.blockhealth = مقدار الصحة التي تبدأ بها الكتل.
lenum.blockdamage = مقدار الضرر الذي تلحقه الكتل (الأبراج).
lenum.rtsminweight = الحد الأدنى من "الأفضلية" اللازمة لهجوم فرقة. كلما زادت -> أصبحت أكثر حذرًا.
lenum.rtsminsquad = الحد الأدنى لحجم فرق الهجوم.
lenum.maparea = منطقة الخريطة القابلة للعب. أي شيء خارج المنطقة لن يكون تفاعليًا.
lenum.ambientlight = لون الإضاءة المحيطة. يُستخدم عند تفعيل الإضاءة.
lenum.solarmultiplier = يضاعف إنتاج الطاقة للألواح الشمسية.
lenum.dragmultiplier = مضاعف مقاومة البيئة.
lenum.ban = الكتل أو الوحدات التي لا يمكن وضعها أو بناؤها.
lenum.unban = ألغِ حظر وحدة أو كتلة.
