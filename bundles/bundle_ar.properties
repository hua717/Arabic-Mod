locales.info = هنا يمكنك إضافة حزم لغة للغات محددة إلى خريطتك. في حزم اللغة، كل خاصية لها اسم وقيمة. يمكن استخدام هذه الخصائص بواسطة معالجات العالم والأهداف باستخدام أسمائها. وهي تدعم تنسيق النصوص (استبدال العناصر النائبة بقيم فعلية).\n\n[cyan]مثال على خاصية:\n[]الاسم: [accent]timer[]\nالقيمة: [accent]مثال مؤقت، الوقت المتبقي: {0}[]\n\n[cyan]الاستخدام:\n[]عيّنها كنص للهدف: [accent]@timer\n\n[]اطبعها في معالج عالم:\n[accent]localeprint "timer"\nformat time\n[gray](حيث time هو متغير محسوب بشكل منفصل)
