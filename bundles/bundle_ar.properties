sector.groundZero.description = الموقع الأمثل للبدء من جديد. تهديد منخفض من العدو. موارد قليلة.\n\nاجمع أكبر قدر ممكن من الرصاص والنحاس.\nتابع التقدم.
sector.frozenForest.description = حتى هنا، بالقرب من الجبال، انتشرت الأبواغ. لن تتمكن درجات الحرارة القارسة من احتوائها إلى الأبد.\n\nابدأ مغامرتك في مجال الطاقة. ابنِ مولدات الاحتراق. تعلّم استخدام أجهزة الترميم.
sector.saltFlats.description = على أطراف الصحراء تقع السهول الملحية. يمكن العثور على موارد قليلة في هذا الموقع.\n\nأقام العدو مجمّعًا لتخزين الموارد هنا. اقضِ على نواتهم. لا تترك شيئًا قائمًا.
sector.crateredBattleground.description = تراكمت المياه في هذه الحفرة، وهي أثر من الحروب القديمة. استعد المنطقة. اجمع الرمل. اصهر الزجاج المعدني. اضخّ الماء لتبريد الأبراج والمثاقب.
sector.ruinousShores.description = بعد الأراضي القاحلة، يقع الساحل. كان هذا الموقع يومًا ما يضم منظومة دفاع ساحلية. لم يتبقَّ منها الكثير. لم تنجُ سوى أبسط هياكل الدفاع، بينما تحوّل كل شيء آخر إلى خردة.\n\nواصل التوسع نحو الخارج. أعد اكتشاف التقنية.
sector.stainedMountains.description = في العمق أكثر باتجاه اليابسة تقع الجبال، التي لم تلوّثها الأبواغ بعد.\nاستخرج التيتانيوم الوفير في هذه المنطقة. تعلّم كيفية استخدامه.\n\nوجود العدو أكبر هنا. لا تمنحه الوقت لإرسال أقوى وحداته.
sector.overgrowth.description = هذه المنطقة مغطاة بنمو كثيف، وهي أقرب إلى منشأ الأبواغ.\n\nأسس العدو بؤرة استيطانية هنا. ابنِ وحدات Mace. دمّرها.
sector.tarFields.description = أطراف منطقة إنتاج النفط، بين الجبال والصحراء. واحدة من المناطق القليلة التي تحتوي على احتياطيات قار قابلة للاستخدام.\nرغم أن هذه المنطقة مهجورة، إلا أن بها بعض قوات العدو الخطيرة بالقرب منها. لا تستهن بها.\n\nابحث تقنية معالجة النفط إن أمكن.
sector.desolateRift.description = منطقة خطيرة للغاية. موارد وفيرة، لكن مساحة محدودة. خطر تدمير مرتفع.\n\nابنِ دفاعات جوية وأرضية في أقرب وقت ممكن. لا تنخدع بندرة هجمات العدو.
sector.nuclearComplex.description = منشأة سابقة لإنتاج ومعالجة الثوريوم، تحوّلت إلى أطلال.\nابحث مفاعل الثوريوم، واستخدمه لتوليد طاقة متقدم.\n\nيتواجد العدو هنا بأعداد كبيرة، ويستطلع باستمرار بحثًا عن المهاجمين.
sector.fungalPass.description = منطقة انتقالية بين الجبال الشاهقة والأراضي المنخفضة الموبوءة بالأبواغ. تقع هنا قاعدة استطلاع صغيرة للعدو.\n\nاستخدم وحدات Dagger. دمّر بؤرة العدو.
sector.biomassFacility.description = منشأ الأبواغ. هذه هي المنشأة التي تم فيها بحثها وإنتاجها في البداية.\nابحث التقنية الموجودة بداخلها. ازرع الأبواغ لإنتاج الوقود والبلاستيك.\n\n[lightgray]عند انهيار هذه المنشأة، انطلقت الأبواغ. لم يستطع أي شيء في النظام البيئي المحلي منافسة كائن غازٍ كهذا.
sector.windsweptIslands.description = أبعد من الساحل تقع سلسلة الجزر النائية هذه. تُظهر السجلات أنها كانت تحتوي يومًا ما على منشآت تنتج البلاستانيوم.\n\nصدّ الوحدات البحرية للعدو. أسس قاعدة على الجزر. ابحث هذه المصانع.
sector.extractionOutpost.description = بؤرة استيطانية نائية، شيّدها العدو بهدف إطلاق الموارد إلى قطاعات أخرى.\n\nتقنية النقل بين القطاعات ضرورية لمواصلة الغزو. دمّر القاعدة. ابحث منصات الإطلاق الخاصة بهم.
sector.impact0078.description = هنا تقع بقايا سفينة النقل بين النجوم التي دخلت هذا النظام أول مرة.\n\nأنقذ أكبر قدر ممكن من الحطام. ابحث أي تقنية سليمة.
sector.planetaryTerminal.description = الهدف الأخير.\n\nتحتوي هذه القاعدة الساحلية على منشأة قادرة على إطلاق الأنوية إلى الكواكب المحلية. وهي محروسة بشدة.\n\nأنتج وحدات بحرية. اقضِ على العدو بأسرع ما يمكن. ابحث منشأة الإطلاق.
sector.coastline.description = تم رصد بقايا تقنية تصنيع السبائك في هذا الموقع.\n\nصدّ هجمات العدو، واستولِ على هذا القطاع، واحصل على التقنية.
sector.navalFortress.description = أسس العدو قاعدة على جزيرة نائية محصّنة طبيعيًا. دمّر هذه البؤرة. احصل على تقنية سفنهم البحرية المتقدمة وابحثها.
sector.facility32m.description = يحتوي هذا القطاع على بقايا متعفّنة لمنشأة إنتاج متفجرات.\n\nاستولِ على هذه المنطقة. ابحث خلاط الانفجار. أنتج مركب الانفجار لاستخدامه كذخيرة للأبراج.
sector.taintedWoods.description = [gray][هدف اختياري][]\nغني باحتياطيات النفط، يحتوي هذا القطاع على كتل كبيرة من النمو الفطري، مما يجعل عبوره صعبًا.\n\nاستخدم موارده لإنتاج البلاستانيوم. صدّ العدو.
sector.sunkenPier.description = [gray][هدف اختياري][]\nكانت هذه المنشأة يومًا ما منصة نفط بحرية، لكنها تدهورت منذ زمن طويل.\n\nتم رصد أعداد كبيرة من الوحدات البحرية للعدو. كن مستعدًا لهجمات من اتجاهات متعددة.
sector.atolls.description = [gray][هدف اختياري][]\nتم رصد عدة قواعد بحرية للعدو في هذا الموقع.\n\nاستخدم وحدات الحمولة Mega لنقل القوات البرية إلى مواقع الهجوم. ابنِ وحدات بحرية لتدمير البؤر المحيطة.
sector.frontier.description = تم رصد بؤرة صغيرة للعدو هنا.\n\nابنِ وحدات Mono لحصاد الموارد بفعالية أكبر. استخدم جهاز إعادة البناء الإضافي لتصنيع وحدات أقوى.
sector.infestedCanyons.description = خلف الجبال يقع وادي نهر متعرّج، مغطى الآن بطبقات من طحالب الأبواغ.\n\nاصمد أمام هجوم العدو. ابنِ وحدات بحرية. اقضِ على جميع أنوية العدو.
sector.testingGrounds.description = [gray][هدف اختياري][]\nوادٍ صحراوي مليء بالحفر، كان يُستخدم سابقًا كأرض اختبار للمشاريع العسكرية.\n\nبسبب نقص المياه، قد يشكّل تأسيس وجود في هذا الموقع تحديًا. كن مستعدًا لهجمات من اتجاهات متعددة.
sector.perilousHarbor.description = تم تأسيس عدة قواعد للعدو عبر هذه المنطقة الساحلية الخطيرة.\n\nابنِ وحدات بحرية، واسحق تحصيناتهم.
sector.weatheredChannels.description = [gray][هدف اختياري][]\nيضم نظام القنوات هذا موارد وفيرة. أنزل نواتك. صدّ موجات العدو للاستيلاء عليها.\n\nسيسلك العدو طرقًا متعددة لمهاجمة بنيتك التحتية. ابحث عن علامات كمين محتمل ودافع وفقًا لذلك.
sector.mycelialBastion.description = يقع هذا المجمّع المحصّن في عمق المناطق الفطرية، ويهدد القطاعات المجاورة بوحدات حشرية متقدمة.\n\nهاجم المجمّع. احصل على التقنية بداخله. استخدم وحدات قادرة على تجاوز الجدران.
sector.littoralShipyard.description = يقع في أقصى أطراف البحر المركزي، وتحتوي منشأة الإنتاج البحري هذه على تقنية لبناء وحدات متقدمة.\n\nدمّر هذه المنشأة، واستخدم تقنيتها للمساعدة في إتمام الهدف الأخير.

