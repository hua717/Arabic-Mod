host.info = يقوم زر [accent]الاستضافة[] باستضافة خادم على المنفذ المحدد.\nيجب أن يتمكن أي شخص على نفس [lightgray]شبكة الواي فاي أو الشبكة المحلية[] من رؤية خادمك في قائمة الخوادم لديه.\n\nإذا كنت تريد أن يتمكن الأشخاص من الاتصال من أي مكان عبر عنوان IP، فإن [accent]توجيه المنافذ (Port Forwarding)[] مطلوب.\n\n[lightgray]ملاحظة: إذا واجه أحدهم مشكلة في الاتصال بلعبتك عبر الشبكة المحلية، تأكد من أنك سمحت لـ Mindustry بالوصول إلى شبكتك المحلية في إعدادات جدار الحماية لديك. لاحظ أن الشبكات العامة أحيانًا لا تسمح باكتشاف الخوادم.
join.info = هنا يمكنك إدخال [accent]عنوان IP الخادم[] للاتصال به، أو اكتشاف خوادم [accent]الشبكة المحلية[] أو [accent]العالمية[] للاتصال بها.\nيُدعم كل من تعدد اللاعبين عبر الشبكة المحلية (LAN) والشبكة الواسعة (WAN).\n\n[lightgray]إذا كنت تريد الاتصال بشخص عبر عنوان IP، فستحتاج إلى أن تطلب منه عنوان IP الخاص به، والذي يمكن العثور عليه بالبحث عن "my ip" من جهازه.
